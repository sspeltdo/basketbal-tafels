<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basketbal Tafels 🏀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== FULLSCREEN BUTTON (fixed, always visible) ===== -->
  <button id="btn-fullscreen" class="btn-fullscreen" title="Volledig scherm" aria-label="Volledig scherm"><span class="btn-fullscreen-icon">⛶</span> <span class="btn-fullscreen-label">Volledig scherm</span></button>

  <!-- ===== WELCOME SCREEN ===== -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome-header">
      <div class="ball-bounce">🏀</div>
      <h1>Basketbal Tafels!</h1>
      <p class="subtitle">Kies je oefeningen</p>
    </div>

    <div class="config-section">
      <div class="section-header">
        <h2>Vermenigvuldigen</h2>
        <label class="select-all-label">
          <input type="checkbox" id="select-all-multiply" />
          Alles selecteren
        </label>
      </div>
      <div class="toggle-grid" id="grid-multiply">
        <button class="toggle-btn" data-type="multiply" data-value="1">× 1</button>
        <button class="toggle-btn" data-type="multiply" data-value="2">× 2</button>
        <button class="toggle-btn" data-type="multiply" data-value="3">× 3</button>
        <button class="toggle-btn" data-type="multiply" data-value="4">× 4</button>
        <button class="toggle-btn" data-type="multiply" data-value="5">× 5</button>
        <button class="toggle-btn" data-type="multiply" data-value="6">× 6</button>
        <button class="toggle-btn" data-type="multiply" data-value="7">× 7</button>
        <button class="toggle-btn" data-type="multiply" data-value="8">× 8</button>
        <button class="toggle-btn" data-type="multiply" data-value="9">× 9</button>
        <button class="toggle-btn" data-type="multiply" data-value="10">× 10</button>
      </div>

      <div class="section-header">
        <h2>Delen</h2>
        <label class="select-all-label">
          <input type="checkbox" id="select-all-divide" />
          Alles selecteren
        </label>
      </div>
      <div class="toggle-grid" id="grid-divide">
        <button class="toggle-btn" data-type="divide" data-value="2">÷ 2</button>
        <button class="toggle-btn" data-type="divide" data-value="3">÷ 3</button>
        <button class="toggle-btn" data-type="divide" data-value="4">÷ 4</button>
        <button class="toggle-btn" data-type="divide" data-value="5">÷ 5</button>
        <button class="toggle-btn" data-type="divide" data-value="6">÷ 6</button>
        <button class="toggle-btn" data-type="divide" data-value="7">÷ 7</button>
        <button class="toggle-btn" data-type="divide" data-value="8">÷ 8</button>
        <button class="toggle-btn" data-type="divide" data-value="9">÷ 9</button>
        <button class="toggle-btn" data-type="divide" data-value="10">÷ 10</button>
      </div>

      <div class="question-count-row">
        <label for="question-count">Aantal vragen:</label>
        <select id="question-count">
          <option value="10">10</option>
          <option value="15">15</option>
          <option value="20">20</option>
          <option value="25">25</option>
        </select>
      </div>

      <button id="btn-play" class="btn-primary" disabled>Speel! 🏀</button>
    </div>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="screen-game" class="screen">
    <div class="court-bg"></div>

    <div class="game-header">
      <div class="progress-info">
        <span id="question-label">Vraag 1 van 10</span>
      </div>
      <div class="scoreboard">
        <span>🏀 Score: </span>
        <span id="score-correct">0</span>
        <span> / </span>
        <span id="score-total">0</span>
      </div>
    </div>

    <div class="question-area">
      <div id="question-text" class="question-text"></div>

      <!-- Multiple choice answers -->
      <div id="mc-area" class="mc-area hidden">
        <div class="mc-grid">
          <button class="mc-btn" id="mc-btn-0"></button>
          <button class="mc-btn" id="mc-btn-1"></button>
          <button class="mc-btn" id="mc-btn-2"></button>
          <button class="mc-btn" id="mc-btn-3"></button>
        </div>
      </div>

      <!-- Fill-in answer -->
      <div id="fill-area" class="fill-area hidden">
        <!-- Display element: updated by the on-screen keyboard, never focuses native keyboard -->
        <div id="fill-input" class="fill-input" role="status" aria-live="polite" aria-label="Ingetypt antwoord" tabindex="-1">
          <span class="fill-input-placeholder">?</span>
        </div>
        <button id="fill-submit" class="btn-primary hidden">OK ✔</button>
      </div>

      <!-- Feedback message -->
      <div id="feedback" class="feedback hidden">
        <span id="feedback-icon"></span>
        <span id="feedback-text"></span>
      </div>
    </div>

    <!-- ===== ON-SCREEN KEYBOARD (fill-in mode only) ===== -->
    <div id="on-screen-keyboard" class="on-screen-keyboard hidden" role="group" aria-label="Toetsenbord">
      <div class="osk-grid">
        <button class="key" data-key="7" aria-label="7">7</button>
        <button class="key" data-key="8" aria-label="8">8</button>
        <button class="key" data-key="9" aria-label="9">9</button>
        <button class="key" data-key="4" aria-label="4">4</button>
        <button class="key" data-key="5" aria-label="5">5</button>
        <button class="key" data-key="6" aria-label="6">6</button>
        <button class="key" data-key="1" aria-label="1">1</button>
        <button class="key" data-key="2" aria-label="2">2</button>
        <button class="key" data-key="3" aria-label="3">3</button>
        <button class="key key-clear" data-key="clear" aria-label="Wis alles">C</button>
        <button class="key" data-key="0" aria-label="0">0</button>
        <button class="key key-backspace" data-key="backspace" aria-label="Verwijder laatste cijfer">⌫</button>
        <button class="key key-ok" data-key="ok" aria-label="Bevestig antwoord">OK ✔</button>
      </div>
    </div>
  </div>

  <!-- ===== END SCREEN ===== -->
  <div id="screen-end" class="screen">
    <div class="end-trophy">🏆</div>
    <h1 id="end-title">Goed gedaan!</h1>
    <div id="end-score" class="end-score"></div>
    <p id="end-message" class="end-message"></p>
    <div class="end-buttons">
      <button id="btn-replay-same" class="btn-primary">Zelfde oefeningen 🔁</button>
      <button id="btn-replay-new" class="btn-secondary">Opnieuw spelen ⚙️</button>
    </div>
  </div>

  <!-- ===== MINI-GAME SCREEN ===== -->
  <div id="screen-minigame" class="screen">
    <div class="minigame-header">
      <h2 class="minigame-title">Bonusspel! 🎉</h2>
      <p class="minigame-subtitle" id="minigame-subtitle">Tik zo snel mogelijk op de bal!</p>
    </div>
    <div class="minigame-arena">
      <div class="minigame-timer-wrap">
        <span id="minigame-timer">5</span>
      </div>
      <button id="minigame-ball" class="minigame-ball">🏀</button>
      <div class="minigame-tap-display">
        <span id="minigame-count">0</span>
        <span class="minigame-tap-label">tikken</span>
      </div>
    </div>
    <div id="minigame-result" class="minigame-result hidden">
      <span id="minigame-result-text"></span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
